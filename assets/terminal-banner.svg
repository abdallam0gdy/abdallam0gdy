<svg viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg" font-family="Fira Code, Consolas, monospace">
  <defs>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7F00FF"/>
      <stop offset="100%" stop-color="#E100FF"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#7F00FF" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- floating background glyphs -->
  <g opacity="0.14" fill="#7F00FF" font-weight="bold">
    <text x="60" y="70" font-size="58">&lt;/&gt;</text>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-14;0,0" dur="6s" repeatCount="indefinite"/>
  </g>
  <g opacity="0.10" fill="#E100FF" font-weight="bold">
    <text x="800" y="270" font-size="72">{ }</text>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,16;0,0" dur="7s" repeatCount="indefinite"/>
  </g>
  <g opacity="0.16" fill="#22D3EE" font-weight="bold">
    <text x="775" y="55" font-size="36">01</text>
    <animateTransform attributeName="transform" type="rotate" values="0 791 45;360 791 45" dur="18s" repeatCount="indefinite"/>
  </g>
  <g opacity="0.09" fill="#7F00FF" font-weight="bold">
    <text x="30" y="280" font-size="90">;</text>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-10;0,0" dur="5s" repeatCount="indefinite"/>
  </g>
  <g opacity="0.12" fill="#E100FF" font-weight="bold">
    <text x="430" y="40" font-size="30">()</text>
    <animateTransform attributeName="transform" type="translate" values="0,0;14,0;0,0" dur="8s" repeatCount="indefinite"/>
  </g>

  <!-- terminal window -->
  <rect x="150" y="20" width="600" height="280" rx="14" fill="#0D1117" stroke="url(#borderGrad)" stroke-width="2" filter="url(#softShadow)"/>
  <path d="M150,34 a14,14 0 0,1 14,-14 h572 a14,14 0 0,1 14,14 v22 h-600 z" fill="#161B22"/>
  <circle cx="174" cy="38" r="6" fill="#FF5F56"/>
  <circle cx="196" cy="38" r="6" fill="#FFBD2E"/>
  <circle cx="218" cy="38" r="6" fill="#27C93F"/>
  <text x="450" y="42" font-size="13" fill="#8B949E" text-anchor="middle">abdalla@portfolio: ~</text>

  <!-- typing code lines -->
  <g font-size="16" fill="#E6EDF3">
    <g><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.0375;0.0563;0.8125;0.8625;1" dur="8s" repeatCount="indefinite"/>
      <text x="175" y="85"><tspan fill="#C792EA">const</tspan> developer = {</text>
    </g>
    <g><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.1;0.1188;0.8125;0.8625;1" dur="8s" repeatCount="indefinite"/>
      <text x="195" y="113"><tspan fill="#79C0FF">name</tspan>: <tspan fill="#A5D6A7">"Abdalla Magdy"</tspan>,</text>
    </g>
    <g><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.1625;0.1813;0.8125;0.8625;1" dur="8s" repeatCount="indefinite"/>
      <text x="195" y="141"><tspan fill="#79C0FF">role</tspan>: <tspan fill="#A5D6A7">"Full Stack Developer"</tspan>,</text>
    </g>
    <g><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.225;0.2438;0.8125;0.8625;1" dur="8s" repeatCount="indefinite"/>
      <text x="195" y="169"><tspan fill="#79C0FF">stack</tspan>: [<tspan fill="#A5D6A7">"React","Laravel","Supabase"</tspan>],</text>
    </g>
    <g><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.2875;0.3063;0.8125;0.8625;1" dur="8s" repeatCount="indefinite"/>
      <text x="195" y="197"><tspan fill="#79C0FF">status</tspan>: <tspan fill="#A5D6A7">"Building cool things 🚀"</tspan></text>
    </g>
    <g><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.35;0.3688;0.8125;0.8625;1" dur="8s" repeatCount="indefinite"/>
      <text x="175" y="225">};</text>
    </g>
  </g>

  <!-- blinking cursor -->
  <rect x="204" y="212" width="9" height="18" fill="#22D3EE">
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
