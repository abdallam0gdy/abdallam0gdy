<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg" font-family="Fira Code, Consolas, monospace">
  <defs>
    <linearGradient id="centerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7F00FF"/>
      <stop offset="100%" stop-color="#E100FF"/>
    </linearGradient>
  </defs>

  <!-- faint orbit guide ring -->
  <circle cx="250" cy="250" r="180" fill="none" stroke="#7F00FF" stroke-opacity="0.15" stroke-width="1.5" stroke-dasharray="4 6"/>

  <!-- rotating ring of skill nodes -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 250 250" to="360 250 250" dur="26s" repeatCount="indefinite"/>

    <g transform="translate(250,70)">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="26s" repeatCount="indefinite"/>
        <circle r="30" fill="#7F00FF" stroke="#0D1117" stroke-width="3"/>
        <text text-anchor="middle" dy="5" font-size="13" fill="#ffffff" font-weight="bold">React</text>
      </g>
    </g>

    <g transform="translate(377,123)">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="26s" repeatCount="indefinite"/>
        <circle r="30" fill="#E100FF" stroke="#0D1117" stroke-width="3"/>
        <text text-anchor="middle" dy="5" font-size="13" fill="#ffffff" font-weight="bold">JS</text>
      </g>
    </g>

    <g transform="translate(430,250)">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="26s" repeatCount="indefinite"/>
        <circle r="30" fill="#22D3EE" stroke="#0D1117" stroke-width="3"/>
        <text text-anchor="middle" dy="5" font-size="13" fill="#0D1117" font-weight="bold">PHP</text>
      </g>
    </g>

    <g transform="translate(377,377)">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="26s" repeatCount="indefinite"/>
        <circle r="30" fill="#7F00FF" stroke="#0D1117" stroke-width="3"/>
        <text text-anchor="middle" dy="5" font-size="13" fill="#ffffff" font-weight="bold">SQL</text>
      </g>
    </g>

    <g transform="translate(250,430)">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="26s" repeatCount="indefinite"/>
        <circle r="30" fill="#E100FF" stroke="#0D1117" stroke-width="3"/>
        <text text-anchor="middle" dy="5" font-size="13" fill="#ffffff" font-weight="bold">Node</text>
      </g>
    </g>

    <g transform="translate(123,377)">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="26s" repeatCount="indefinite"/>
        <circle r="30" fill="#22D3EE" stroke="#0D1117" stroke-width="3"/>
        <text text-anchor="middle" dy="5" font-size="13" fill="#0D1117" font-weight="bold">CSS</text>
      </g>
    </g>

    <g transform="translate(70,250)">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="26s" repeatCount="indefinite"/>
        <circle r="30" fill="#7F00FF" stroke="#0D1117" stroke-width="3"/>
        <text text-anchor="middle" dy="5" font-size="13" fill="#ffffff" font-weight="bold">Git</text>
      </g>
    </g>

    <g transform="translate(123,123)">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="26s" repeatCount="indefinite"/>
        <circle r="30" fill="#E100FF" stroke="#0D1117" stroke-width="3"/>
        <text text-anchor="middle" dy="5" font-size="13" fill="#ffffff" font-weight="bold">TS</text>
      </g>
    </g>
  </g>

  <!-- central pulsing core -->
  <circle cx="250" cy="250" fill="url(#centerGrad)">
    <animate attributeName="r" values="55;60;55" dur="3s" repeatCount="indefinite"/>
  </circle>
  <text x="250" y="259" text-anchor="middle" font-size="30" fill="#ffffff" font-weight="bold">&lt;/&gt;</text>
</svg>
